<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Фон -->
  <rect width="32" height="32" rx="8" fill="#F5F4F0"/>

  <!-- Лупа — круг -->
  <circle cx="13" cy="13" r="8.5" stroke="#6E5C92" stroke-width="2.2" fill="white"/>

  <!-- Столбики графика внутри лупы -->
  <rect x="7" y="14" width="2.2" height="4.5" rx="0.5" fill="#C084FC"/>
  <rect x="10.2" y="11.5" width="2.2" height="7" rx="0.5" fill="#9333EA"/>
  <rect x="13.4" y="9" width="2.2" height="9.5" rx="0.5" fill="#6E5C92"/>

  <!-- Стрелка вверх-вправо -->
  <line x1="7" y1="16" x2="15.5" y2="8" stroke="#6E5C92" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Ручка лупы -->
  <line x1="19.5" y1="19.5" x2="24.5" y2="24.5" stroke="#6E5C92" stroke-width="2.5" stroke-linecap="round"/>
</svg>
